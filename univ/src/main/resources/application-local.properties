spring.application.name=univ
spring.main.lazy-initialization=true

spring.r2dbc.url=r2dbc:postgresql://localhost:5432/univ
spring.r2dbc.username=postgres
spring.r2dbc.password=postgres
spring.flyway.enabled=true
spring.flyway.url=jdbc:postgresql://localhost:5432/univ
spring.flyway.user=postgres
spring.flyway.password=postgres
spring.flyway.locations=classpath:db/migration
management.health.db.enabled=false
management.health.r2dbc.enabled=false

file.storage.directory=./storage

security.allow-credentials=true
security.allowed-origins[0]=http://localhost:3000
security.allowed-origins[1]=http://localhost:5173
security.allowed-headers[0]=*
security.exposed-headers[0]=Set-Cookie
security.exposed-headers[1]=Authorization
security.allowed-methods[0]=GET
security.allowed-methods[1]=POST
security.allowed-methods[2]=PUT
security.allowed-methods[3]=DELETE
security.allowed-methods[4]=OPTIONS
security.allowed-public-apis[0]=/swagger-ui.html
security.allowed-public-apis[1]=/swagger-ui/**
security.allowed-public-apis[2]=/v3/api-docs/**
security.allowed-public-apis[3]=/actuator/**
security.allowed-public-apis[4]=/auth

security.cookie-props.domain=localhost
security.cookie-props.path=/
security.cookie-props.http-only=true
security.cookie-props.secure=false
security.cookie-props.max-age-in-minutes=1440

security.firebase-props.session-expiry-in-days=7
security.firebase-props.enable-strict-server-session=false
security.firebase-props.enable-check-session-revoked=false
security.firebase-props.enable-logout-everywhere=false
security.firebase-props.api-identity-url=https://identitytoolkit.googleapis.com
security.firebase-props.api-key=dev-placeholder
security.firebase-props.google-credentials=

dev.auth.bootstrap.enabled=true
dev.auth.bootstrap-admin-email=admin@dev
dev.auth.bootstrap-admin-password=Admin123!
dev.auth.bootstrap-admin-name=Admin
dev.auth.bootstrap-admin-phone=77000000000
